<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>街道家具展示牆</title>
  <style>
    :root {
      --bg:       #F4F0E8;
      --surface:  #FFFFFF;
      --primary:  #3A7ABD;
      --green:    #5A9B5A;
      --purple:   #6B5CE7;
      --accent:   #D4784A;
      --text:     #1E2535;
      --sub:      #6B7280;
      --border:   #DDD8CC;
      --r:        12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .header-title { font-size: 22px; font-weight: 800; }
    .header-sub   { font-size: 13px; color: var(--sub); margin-top: 2px; }
    .btn-refresh {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--r);
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      font-family: inherit;
    }
    .btn-refresh:hover { background: #2D5F94; }

    /* ── Main content ── */
    .main {
      padding: 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── States ── */
    .state-wrap {
      text-align: center;
      padding: 80px 20px;
      color: var(--sub);
    }
    .state-icon  { font-size: 56px; margin-bottom: 16px; }
    .state-msg   { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .state-hint  { font-size: 14px; }

    /* ── Group cards ── */
    .group-section { margin-bottom: 40px; }
    .group-name {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .group-badge {
      background: var(--primary);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      border-radius: 20px;
      padding: 3px 10px;
    }

    /* ── Submission grid ── */
    .submissions {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ── Single submission card ── */
    .card {
      background: var(--surface);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
    }
    .card-media {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }
    .card-media.has-both { grid-template-columns: 1fr 1fr; }

    .media-thumb {
      position: relative;
      background: #000;
      aspect-ratio: 16/9;
      overflow: hidden;
      cursor: pointer;
    }
    .media-thumb:hover .media-overlay { opacity: 1; }

    .media-thumb img,
    .media-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .25s;
    }
    .media-thumb:hover img,
    .media-thumb:hover video { transform: scale(1.04); }

    .media-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .2s;
      font-size: 36px;
    }
    .media-type-label {
      position: absolute;
      bottom: 6px;
      left: 8px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      background: rgba(0,0,0,.55);
      border-radius: 6px;
      padding: 2px 8px;
    }

    .card-footer {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-time  { font-size: 12px; color: var(--sub); flex: 1; }
    .btn-delete {
      background: transparent;
      border: 1.5px solid #FCA5A5;
      color: #DC2626;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background .18s;
      white-space: nowrap;
    }
    .btn-delete:hover { background: #FEF2F2; }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 900;
      align-items: center;
      justify-content: center;
      padding: 20px;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox-media { max-width: 96vw; max-height: 92vh; border-radius: 8px; }
    #lightbox-media.video { width: min(960px, 96vw); }
    #lightbox-close {
      position: fixed;
      top: 18px;
      right: 22px;
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      font-size: 28px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      z-index: 901;
    }
    #lightbox-close:hover { background: rgba(255,255,255,.28); }
    #lightbox-label {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.75);
      font-size: 15px;
      font-weight: 600;
      background: rgba(0,0,0,.4);
      border-radius: 20px;
      padding: 6px 18px;
      pointer-events: none;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .main { padding: 20px 16px; }
      .header { padding: 16px 20px; }
      .header-title { font-size: 18px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🏙️ 街道家具展示牆</div>
    <div class="header-sub" id="last-update">讀取中…</div>
  </div>
  <button class="btn-refresh" id="btn-refresh">↻ 重新整理</button>
</div>

<div class="main" id="main">
  <div class="state-wrap" id="state-loading">
    <div class="state-icon">⏳</div>
    <div class="state-msg">正在載入作品…</div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close">✕</button>
  <div id="lightbox-label"></div>
  <!-- media inserted dynamically -->
</div>

<script src="config.js"></script>
<script>
'use strict';

const BUCKET = CONFIG.FIREBASE_BUCKET;
const KEY    = CONFIG.FIREBASE_API_KEY;

// ── Load all gallery items ─────────────────────────────────────
async function loadGallery() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="state-wrap" id="state-loading"><div class="state-icon">⏳</div><div class="state-msg">正在載入作品…</div></div>';

  try {
    const url  = `https://firebasestorage.googleapis.com/v0/b/${BUCKET}/o?prefix=gallery%2F&key=${KEY}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);

    const items = data.items || [];
    if (items.length === 0) {
      main.innerHTML = `<div class="state-wrap">
        <div class="state-icon">🎨</div>
        <div class="state-msg">目前還沒有作品</div>
        <div class="state-hint">學生上傳作品後，這裡就會出現！</div>
      </div>`;
      updateTimestamp();
      return;
    }

    renderGallery(items);
    updateTimestamp();
  } catch (err) {
    main.innerHTML = `<div class="state-wrap">
      <div class="state-icon">⚠️</div>
      <div class="state-msg">載入失敗</div>
      <div class="state-hint">${err.message}</div>
    </div>`;
  }
}

function updateTimestamp() {
  const el = document.getElementById('last-update');
  el.textContent = `最後更新：${new Date().toLocaleTimeString('zh-TW')}`;
}

// ── Parse items into grouped structure ────────────────────────
function renderGallery(items) {
  // Build: { groupName: { ts: { image, video } } }
  const groups = {};
  items.forEach(item => {
    const parts = item.name.split('/');
    if (parts.length < 3) return;
    const groupName = decodeURIComponent(parts[1]);
    const filename  = parts[2];
    const tsMatch   = filename.match(/^(\d+)_/);
    if (!tsMatch) return;
    const ts = tsMatch[1];

    if (!groups[groupName])       groups[groupName] = {};
    if (!groups[groupName][ts])   groups[groupName][ts] = {};

    if (filename.endsWith('_image.png')) {
      groups[groupName][ts].image = item.name;
    } else if (filename.endsWith('_video.mp4')) {
      groups[groupName][ts].video = item.name;
    }
  });

  const main = document.getElementById('main');
  main.innerHTML = '';

  // Sort groups alphabetically
  const sortedGroups = Object.keys(groups).sort((a, b) => a.localeCompare(b, 'zh-TW'));

  sortedGroups.forEach(groupName => {
    const submissions = groups[groupName];
    // Sort submissions newest first
    const sortedTs = Object.keys(submissions).sort((a, b) => b - a);

    const section = document.createElement('div');
    section.className = 'group-section';

    const count = sortedTs.length;
    section.innerHTML = `
      <div class="group-name">
        📌 ${groupName}
        <span class="group-badge">${count} 件作品</span>
      </div>
      <div class="submissions" id="sub-${CSS.escape(groupName)}"></div>
    `;
    main.appendChild(section);

    const subContainer = section.querySelector('.submissions');
    sortedTs.forEach(ts => {
      const sub = submissions[ts];
      subContainer.appendChild(buildCard(groupName, ts, sub));
    });
  });
}

function getDownloadUrl(name) {
  return `https://firebasestorage.googleapis.com/v0/b/${BUCKET}/o/${encodeURIComponent(name)}?alt=media&key=${KEY}`;
}

function buildCard(groupName, ts, sub) {
  const card = document.createElement('div');
  card.className = 'card';

  const hasImage = !!sub.image;
  const hasVideo = !!sub.video;
  const hasBoth  = hasImage && hasVideo;

  const mediaDiv = document.createElement('div');
  mediaDiv.className = `card-media${hasBoth ? ' has-both' : ''}`;

  if (hasImage) {
    const imgUrl  = getDownloadUrl(sub.image);
    const thumb   = document.createElement('div');
    thumb.className = 'media-thumb';
    thumb.innerHTML = `
      <img src="${imgUrl}" loading="lazy" alt="設計圖">
      <div class="media-overlay">🔍</div>
      <div class="media-type-label">圖片</div>
    `;
    thumb.addEventListener('click', () => openLightboxImage(imgUrl, groupName));
    mediaDiv.appendChild(thumb);
  }

  if (hasVideo) {
    const vidUrl = getDownloadUrl(sub.video);
    const thumb  = document.createElement('div');
    thumb.className = 'media-thumb';
    thumb.innerHTML = `
      <video src="${vidUrl}" muted preload="metadata"></video>
      <div class="media-overlay">▶</div>
      <div class="media-type-label">影片</div>
    `;
    thumb.addEventListener('click', () => openLightboxVideo(vidUrl, groupName));
    mediaDiv.appendChild(thumb);
  }

  const uploadTime = new Date(+ts).toLocaleString('zh-TW', {
    month: '2-digit', day: '2-digit',
    hour: '2-digit',  minute: '2-digit',
  });

  const footer = document.createElement('div');
  footer.className = 'card-footer';
  footer.innerHTML = `<span class="card-time">📅 ${uploadTime}</span>`;

  const delBtn = document.createElement('button');
  delBtn.className = 'btn-delete';
  delBtn.textContent = '🗑 刪除';
  delBtn.addEventListener('click', () => deleteSubmission(groupName, ts, sub, card));
  footer.appendChild(delBtn);

  card.appendChild(mediaDiv);
  card.appendChild(footer);

  return card;
}

// ── Delete ─────────────────────────────────────────────────────
async function deleteSubmission(groupName, ts, sub, cardEl) {
  if (!confirm(`確定要刪除「${groupName}」上傳於 ${new Date(+ts).toLocaleString('zh-TW')} 的作品嗎？`)) return;

  const toDelete = [sub.image, sub.video].filter(Boolean);
  try {
    await Promise.all(toDelete.map(deleteFile));
    cardEl.style.transition = 'opacity .3s';
    cardEl.style.opacity = '0';
    setTimeout(() => {
      cardEl.remove();
      // Hide group section if no more cards
      const section = document.querySelector(`.submissions:empty`)?.closest('.group-section');
      section?.remove();
    }, 300);
  } catch (err) {
    alert(`刪除失敗：${err.message}`);
  }
}

async function deleteFile(name) {
  const url = `https://firebasestorage.googleapis.com/v0/b/${BUCKET}/o/${encodeURIComponent(name)}?key=${KEY}`;
  const res = await fetch(url, { method: 'DELETE' });
  if (!res.ok && res.status !== 404) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.error?.message || `刪除失敗 (${res.status})`);
  }
}

// ── Lightbox ───────────────────────────────────────────────────
const lb      = document.getElementById('lightbox');
const lbClose = document.getElementById('lightbox-close');
const lbLabel = document.getElementById('lightbox-label');
let   lbMedia = null;

function openLightboxImage(src, label) {
  clearLightbox();
  const img = document.createElement('img');
  img.id  = 'lightbox-media';
  img.src = src;
  lb.insertBefore(img, lbLabel);
  lbLabel.textContent = label;
  lb.classList.add('open');
  lbMedia = img;
}

function openLightboxVideo(src, label) {
  clearLightbox();
  const vid = document.createElement('video');
  vid.id       = 'lightbox-media';
  vid.className = 'video';
  vid.src      = src;
  vid.controls = true;
  vid.autoplay = true;
  vid.playsinline = true;
  lb.insertBefore(vid, lbLabel);
  lbLabel.textContent = label;
  lb.classList.add('open');
  lbMedia = vid;
  vid.addEventListener('click', e => e.stopPropagation());
}

function clearLightbox() {
  if (lbMedia) {
    if (lbMedia.tagName === 'VIDEO') lbMedia.pause();
    lbMedia.remove();
    lbMedia = null;
  }
}

function closeLightbox() {
  clearLightbox();
  lb.classList.remove('open');
}

lb.addEventListener('click',      closeLightbox);
lbClose.addEventListener('click', closeLightbox);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

// ── Init ──────────────────────────────────────────────────────
document.getElementById('btn-refresh').addEventListener('click', loadGallery);
loadGallery();
</script>
</body>
</html>
